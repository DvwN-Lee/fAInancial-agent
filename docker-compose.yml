services:
  mcp-server:
    build: ./mcp_server
    ports:
      - "8001:8001"
    env_file:
      - .env
    restart: unless-stopped

  agent:
    build: ./agent
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - MCP_SERVER_URL=http://mcp-server:8001
    depends_on:
      - mcp-server
    restart: unless-stopped
